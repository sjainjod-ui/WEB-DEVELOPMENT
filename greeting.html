<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greeting App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    h1 {
      color: #333;
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }

    .color-box {
      width: 150px;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #333;
      border-radius: 10px;
      background-color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
      font-size: 18px;
      font-weight: bold;
      text-transform: uppercase;
    }

    .color-box:hover {
      opacity: 0.8;
    }

    .input-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    input {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 200px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <h1 id="greeting">Hello</h1>

  <div class="container">
    <div class="color-box" data-color="red">red</div>
    <div class="color-box" data-color="blue">blue</div>
    <div class="color-box" data-color="green">green</div>
    <div class="color-box" data-color="yellow">yellow</div>
  </div>

  <div class="input-section">
    <input type="text" id="nameInput" placeholder="Enter your name">
    <button id="greetBtn">Greet Me</button>
  </div>

  <script>
    // Get elements
    const greeting = document.getElementById('greeting');
    const nameInput = document.getElementById('nameInput');
    const greetBtn = document.getElementById('greetBtn');
    const colorBoxes = document.querySelectorAll('.color-box');

    // Function to greet user
    function greetUser() {
      const name = nameInput.value.trim();
      if (name) {
        greeting.textContent = `Hello, ${name}`;
      } else {
        greeting.textContent = 'Hello';
      }
    }

    // Add event listener to button
    greetBtn.addEventListener('click', greetUser);

    // Add event listeners to color boxes
    colorBoxes.forEach(box => {
      box.addEventListener('click', function() {
        const color = this.textContent;
        this.style.backgroundColor = color;
      });
    });
  </script>
</body>
</html>
